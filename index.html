<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schlanke Three.js Engine (GitHub Web Stable)</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Lädt Three.js global, ohne die restriktiven Browser-Import-Mechanismen zu verletzen -->
    <script src="https://unpkg.com"></script>
</head>
<body>
    <div id="ui-container">
        <h1>Modular Three.js Engine</h1>
        <p>FPS: <span id="fps-counter">0</span></p>
        <p>Steuerung: WASD / Pfeiltasten zum Bewegen</p>
    </div>
    
    <!-- Normales Skript statt type="module", um CORS- und MIME-Fehler auf GitHub zu verhindern -->
    <script src="engine.js"></script>
</body>
</html>
